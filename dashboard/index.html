<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Med Buddy Inquiry Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns"></script>
  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      min-height: 100vh;
      color: #e0e0e0;
    }

    .container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 20px;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 30px;
      padding-bottom: 20px;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }

    h1 {
      font-size: 28px;
      background: linear-gradient(90deg, #00d9ff, #00ff88);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .last-updated {
      font-size: 14px;
      color: #888;
    }

    .refresh-btn {
      background: linear-gradient(90deg, #00d9ff, #00ff88);
      border: none;
      padding: 10px 20px;
      border-radius: 8px;
      color: #1a1a2e;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .refresh-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 20px rgba(0, 217, 255, 0.4);
    }

    /* KPI Cards */
    .kpi-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      margin-bottom: 30px;
    }

    .kpi-card {
      background: rgba(255,255,255,0.05);
      border-radius: 16px;
      padding: 24px;
      border: 1px solid rgba(255,255,255,0.1);
      backdrop-filter: blur(10px);
    }

    .kpi-card h3 {
      font-size: 14px;
      color: #888;
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .kpi-value {
      font-size: 36px;
      font-weight: 700;
      background: linear-gradient(90deg, #00d9ff, #00ff88);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .kpi-change {
      font-size: 14px;
      margin-top: 8px;
    }

    .kpi-change.positive { color: #00ff88; }
    .kpi-change.negative { color: #ff6b6b; }

    /* Charts Grid */
    .charts-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
      gap: 20px;
      margin-bottom: 30px;
    }

    .chart-card {
      background: rgba(255,255,255,0.05);
      border-radius: 16px;
      padding: 24px;
      border: 1px solid rgba(255,255,255,0.1);
    }

    .chart-card h3 {
      font-size: 16px;
      margin-bottom: 20px;
      color: #fff;
    }

    .chart-container {
      position: relative;
      height: 300px;
    }

    /* Full width chart */
    .chart-full {
      grid-column: 1 / -1;
    }

    /* Tables */
    .table-card {
      background: rgba(255,255,255,0.05);
      border-radius: 16px;
      padding: 24px;
      border: 1px solid rgba(255,255,255,0.1);
      margin-bottom: 20px;
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th, td {
      padding: 12px;
      text-align: left;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }

    th {
      color: #888;
      font-weight: 600;
      text-transform: uppercase;
      font-size: 12px;
      letter-spacing: 1px;
    }

    tr:hover {
      background: rgba(255,255,255,0.02);
    }

    .status-badge {
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
    }

    .status-new { background: rgba(0, 217, 255, 0.2); color: #00d9ff; }
    .status-contacted { background: rgba(255, 193, 7, 0.2); color: #ffc107; }
    .status-qualified { background: rgba(0, 255, 136, 0.2); color: #00ff88; }
    .status-converted { background: rgba(157, 76, 255, 0.2); color: #9d4cff; }

    /* Loading */
    .loading {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 400px;
      font-size: 18px;
      color: #888;
    }

    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid rgba(255,255,255,0.1);
      border-top-color: #00d9ff;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-right: 15px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Error state */
    .error {
      background: rgba(255, 107, 107, 0.1);
      border: 1px solid rgba(255, 107, 107, 0.3);
      border-radius: 16px;
      padding: 24px;
      text-align: center;
      color: #ff6b6b;
    }

    /* Responsive */
    @media (max-width: 768px) {
      .charts-grid {
        grid-template-columns: 1fr;
      }

      header {
        flex-direction: column;
        gap: 15px;
        text-align: center;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>🏥 Med Buddy Inquiry Dashboard</h1>
      <div style="display: flex; align-items: center; gap: 15px;">
        <span class="last-updated" id="lastUpdated">Last updated: --</span>
        <button class="refresh-btn" onclick="loadData()">↻ Refresh</button>
      </div>
    </header>

    <div id="content">
      <div class="loading">
        <div class="spinner"></div>
        <span>Loading data from Google Sheets...</span>
      </div>
    </div>
  </div>

  <script>
    // Google Sheet CSV URL - Published to Web
    // Format: https://docs.google.com/spreadsheets/d/SHEET_ID/gviz/tq?tqx=out:csv
    // Your published Google Sheet CSV URL
    const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTOhcUNRC92HXBbyADCYoan3cCpDUa09hqPEqAIAz-qeI58eCC8Lc-L0HQCrJjz-rRh0NKdl5ep6XwM/pub?output=csv';

    let rawData = [];
    let charts = {};

    function parseDate(dateStr) {
      if (!dateStr || dateStr === '-') return null;
      // Handle formats like "10-Mar-26", "DD-Mon-YY"
      const months = {
        'Jan': 0, 'Feb': 1, 'Mar': 2, 'Apr': 3, 'May': 4, 'Jun': 5,
        'Jul': 6, 'Aug': 7, 'Sep': 8, 'Oct': 9, 'Nov': 10, 'Dec': 11
      };
      const match = dateStr.match(/(\d{1,2})-([A-Za-z]{3})-(\d{2,4})/);
      if (match) {
        const day = parseInt(match[1]);
        const month = months[match[2]];
        let year = parseInt(match[3]);
        if (year < 100) year += 2000;
        return new Date(year, month, day);
      }
      return null;
    }

    function parseCurrency(value) {
      if (!value || value === '-' || value === 'Free') return 0;
      const num = parseFloat(value.replace(/[^0-9.-]/g, ''));
      return isNaN(num) ? 0 : num;
    }

    function processData(data) {
      return data.map(row => ({
        slNo: row['SL NO'] || '',
        date: parseDate(row['DATE']),
        dateStr: row['DATE'] || '',
        patientName: row["PATIENT'S NAME"] || '',
        age: parseInt(row['AGE']) || 0,
        contactNo: row['PATIENT CONTACT NO.'] || '',
        attendant: row['ATTENDANT (if any)'] || '',
        attendantContact: row['ATTENDANT CONTACT NO.'] || '',
        address: row['ADDRESS'] || '',
        hospital: row['HOSPITAL'] || '',
        department: row['DEPARTMENT'] || '',
        doctor: row['DOCTOR'] || '',
        service: row['SERVICE'] || '',
        mmbCharges: parseCurrency(row['MMB Charges']),
        hospitalCharges: parseCurrency(row['Hospital Charges']),
        assignedMb: row['ASSIGNED MB'] || '',
        lastFollowUp: parseDate(row['LAST FOLLOW-UP']),
        notes: row['NOTES'] || ''
      })).filter(row => row.slNo !== '');
    }

    function calculateMetrics(data) {
      const now = new Date();
      const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());

      // Total inquiries
      const total = data.length;

      // This week and this month
      const thisWeek = data.filter(d => {
        if (!d.date) return false;
        const weekAgo = new Date(today);
        weekAgo.setDate(weekAgo.getDate() - 7);
        return d.date >= weekAgo;
      }).length;

      const thisMonth = data.filter(d => {
        if (!d.date) return false;
        return d.date.getMonth() === now.getMonth() && d.date.getFullYear() === now.getFullYear();
      }).length;

      // Average response time (using LAST FOLLOW-UP - DATE)
      const responseTimes = data.filter(d => d.date && d.lastFollowUp).map(d =>
        (d.lastFollowUp - d.date) / (1000 * 60 * 60 * 24)
      );
      const avgResponseTime = responseTimes.length > 0
        ? (responseTimes.reduce((a, b) => a + b, 0) / responseTimes.length).toFixed(1)
        : 0;

      // Total revenue
      const totalRevenue = data.reduce((sum, d) => sum + d.mmbCharges, 0);
      const totalHospitalCharges = data.reduce((sum, d) => sum + d.hospitalCharges, 0);

      // Free vs Paid
      const freeCount = data.filter(d => d.mmbCharges === 0).length;
      const paidCount = total - freeCount;

      // Age groups
      const ageGroups = {
        '0-18': data.filter(d => d.age <= 18).length,
        '19-35': data.filter(d => d.age > 18 && d.age <= 35).length,
        '36-50': data.filter(d => d.age > 35 && d.age <= 50).length,
        '51-65': data.filter(d => d.age > 50 && d.age <= 65).length,
        '65+': data.filter(d => d.age > 65).length
      };

      // Department breakdown
      const departments = {};
      data.forEach(d => {
        const dept = d.department || 'Unknown';
        departments[dept] = (departments[dept] || 0) + 1;
      });

      // Hospital breakdown
      const hospitals = {};
      data.forEach(d => {
        const hosp = d.hospital || 'Unknown';
        hospitals[hosp] = (hospitals[hosp] || 0) + 1;
      });

      // Service breakdown
      const services = {};
      data.forEach(d => {
        const svc = d.service || 'Unknown';
        services[svc] = (services[svc] || 0) + 1;
      });

      // MB assignment
      const mbAssignment = {};
      data.forEach(d => {
        const mb = d.assignedMb || 'Unassigned';
        mbAssignment[mb] = (mbAssignment[mb] || 0) + 1;
      });

      // Daily trend
      const dailyTrend = {};
      data.filter(d => d.date).forEach(d => {
        const key = d.date.toISOString().split('T')[0];
        dailyTrend[key] = (dailyTrend[key] || 0) + 1;
      });

      return {
        total,
        thisWeek,
        thisMonth,
        avgResponseTime,
        totalRevenue,
        totalHospitalCharges,
        freeCount,
        paidCount,
        ageGroups,
        departments,
        hospitals,
        services,
        mbAssignment,
        dailyTrend
      };
    }

    function createChart(ctx, type, data, options = {}) {
      return new Chart(ctx, {
        type,
        data,
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: {
              labels: { color: '#888' }
            },
            tooltip: {
              backgroundColor: 'rgba(0,0,0,0.8)',
              titleColor: '#fff',
              bodyColor: '#ccc',
              borderColor: 'rgba(255,255,255,0.1)',
              borderWidth: 1
            }
          },
          scales: {
            x: {
              grid: { color: 'rgba(255,255,255,0.05)' },
              ticks: { color: '#888' }
            },
            y: {
              grid: { color: 'rgba(255,255,255,0.05)' },
              ticks: { color: '#888' }
            }
          },
          ...options
        }
      });
    }

    function renderDashboard(data, metrics) {
      const content = document.getElementById('content');
      const lastUpdated = document.getElementById('lastUpdated');

      lastUpdated.textContent = `Last updated: ${new Date().toLocaleString()}`;

      content.innerHTML = `
        <!-- KPI Cards -->
        <div class="kpi-grid">
          <div class="kpi-card">
            <h3>Total Inquiries</h3>
            <div class="kpi-value">${metrics.total}</div>
            <div class="kpi-change positive">+${metrics.thisMonth} this month</div>
          </div>
          <div class="kpi-card">
            <h3>This Week</h3>
            <div class="kpi-value">${metrics.thisWeek}</div>
            <div class="kpi-change">New inquiries</div>
          </div>
          <div class="kpi-card">
            <h3>Avg Response Time</h3>
            <div class="kpi-value">${metrics.avgResponseTime}</div>
            <div class="kpi-change">Days to follow-up</div>
          </div>
          <div class="kpi-card">
            <h3>Total Revenue</h3>
            <div class="kpi-value">₹${metrics.totalRevenue.toLocaleString()}</div>
            <div class="kpi-change">MMB Charges</div>
          </div>
          <div class="kpi-card">
            <h3>Hospital Charges</h3>
            <div class="kpi-value">₹${metrics.totalHospitalCharges.toLocaleString()}</div>
            <div class="kpi-change">Total value</div>
          </div>
          <div class="kpi-card">
            <h3>Paid Cases</h3>
            <div class="kpi-value">${metrics.paidCount}</div>
            <div class="kpi-change">${metrics.freeCount} free cases</div>
          </div>
        </div>

        <!-- Charts Row 1 -->
        <div class="charts-grid">
          <div class="chart-card">
            <h3>📈 Daily Inquiry Trend</h3>
            <div class="chart-container">
              <canvas id="trendChart"></canvas>
            </div>
          </div>
          <div class="chart-card">
            <h3>🏥 Department Distribution</h3>
            <div class="chart-container">
              <canvas id="deptChart"></canvas>
            </div>
          </div>
        </div>

        <!-- Charts Row 2 -->
        <div class="charts-grid">
          <div class="chart-card">
            <h3>🏨 Top Hospitals</h3>
            <div class="chart-container">
              <canvas id="hospitalChart"></canvas>
            </div>
          </div>
          <div class="chart-card">
            <h3>👥 Age Group Distribution</h3>
            <div class="chart-container">
              <canvas id="ageChart"></canvas>
            </div>
          </div>
        </div>

        <!-- Charts Row 3 -->
        <div class="charts-grid">
          <div class="chart-card">
            <h3>💼 Services Offered</h3>
            <div class="chart-container">
              <canvas id="serviceChart"></canvas>
            </div>
          </div>
          <div class="chart-card">
            <h3>👔 MB Assignment</h3>
            <div class="chart-container">
              <canvas id="mbChart"></canvas>
            </div>
          </div>
        </div>

        <!-- Recent Inquiries Table -->
        <div class="table-card">
          <h3 style="margin-bottom: 15px; color: #fff;">📋 Recent Inquiries</h3>
          <table>
            <thead>
              <tr>
                <th>Date</th>
                <th>Patient</th>
                <th>Age</th>
                <th>Hospital</th>
                <th>Department</th>
                <th>Service</th>
                <th>Charges</th>
              </tr>
            </thead>
            <tbody>
              ${data.slice(-10).reverse().map(d => `
                <tr>
                  <td>${d.dateStr || '-'}</td>
                  <td>${d.patientName || '-'}</td>
                  <td>${d.age || '-'}</td>
                  <td>${d.hospital || '-'}</td>
                  <td>${d.department || '-'}</td>
                  <td>${d.service || '-'}</td>
                  <td>₹${d.mmbCharges || 0}</td>
                </tr>
              `).join('')}
            </tbody>
          </table>
        </div>
      `;

      // Create charts
      const trendCtx = document.getElementById('trendChart').getContext('2d');
      const sortedDates = Object.keys(metrics.dailyTrend).sort();
      charts.trend = createChart(trendCtx, 'line', {
        labels: sortedDates,
        datasets: [{
          label: 'Inquiries',
          data: sortedDates.map(d => metrics.dailyTrend[d]),
          borderColor: '#00d9ff',
          backgroundColor: 'rgba(0, 217, 255, 0.1)',
          fill: true,
          tension: 0.4
        }]
      });

      const deptCtx = document.getElementById('deptChart').getContext('2d');
      charts.dept = createChart(deptCtx, 'doughnut', {
        labels: Object.keys(metrics.departments),
        datasets: [{
          data: Object.values(metrics.departments),
          backgroundColor: [
            '#00d9ff', '#00ff88', '#ffc107', '#ff6b6b', '#9d4cff',
            '#ff9800', '#e91e63', '#3f51b5', '#00bcd4', '#8bc34a'
          ]
        }]
      }, { cutout: '60%' });

      const hospCtx = document.getElementById('hospitalChart').getContext('2d');
      const topHospitals = Object.entries(metrics.hospitals)
        .sort((a, b) => b[1] - a[1])
        .slice(0, 8);
      charts.hospital = createChart(hospCtx, 'bar', {
        labels: topHospitals.map(h => h[0].substring(0, 20)),
        datasets: [{
          label: 'Patients',
          data: topHospitals.map(h => h[1]),
          backgroundColor: 'rgba(0, 255, 136, 0.7)',
          borderRadius: 8
        }]
      }, {
        indexAxis: 'y',
        scales: {
          x: { beginAtZero: true },
          y: { grid: { color: 'rgba(255,255,255,0.05)' } }
        }
      });

      const ageCtx = document.getElementById('ageChart').getContext('2d');
      charts.age = createChart(ageCtx, 'bar', {
        labels: Object.keys(metrics.ageGroups),
        datasets: [{
          label: 'Patients',
          data: Object.values(metrics.ageGroups),
          backgroundColor: [
            'rgba(0, 217, 255, 0.7)',
            'rgba(0, 255, 136, 0.7)',
            'rgba(255, 193, 7, 0.7)',
            'rgba(255, 107, 107, 0.7)',
            'rgba(157, 76, 255, 0.7)'
          ],
          borderRadius: 8
        }]
      });

      const serviceCtx = document.getElementById('serviceChart').getContext('2d');
      const topServices = Object.entries(metrics.services)
        .sort((a, b) => b[1] - a[1])
        .slice(0, 10);
      charts.service = createChart(serviceCtx, 'doughnut', {
        labels: topServices.map(s => s[0].substring(0, 15)),
        datasets: [{
          data: topServices.map(s => s[1]),
          backgroundColor: [
            '#00d9ff', '#00ff88', '#ffc107', '#ff6b6b', '#9d4cff',
            '#ff9800', '#e91e63', '#3f51b5', '#00bcd4', '#8bc34a'
          ]
        }]
      }, { cutout: '50%' });

      const mbCtx = document.getElementById('mbChart').getContext('2d');
      const topMBs = Object.entries(metrics.mbAssignment)
        .sort((a, b) => b[1] - a[1])
        .slice(0, 10);
      charts.mb = createChart(mbCtx, 'bar', {
        labels: topMBs.map(m => m[0].substring(0, 15)),
        datasets: [{
          label: 'Cases',
          data: topMBs.map(m => m[1]),
          backgroundColor: 'rgba(157, 76, 255, 0.7)',
          borderRadius: 8
        }]
      }, {
        indexAxis: 'y',
        scales: {
          x: { beginAtZero: true }
        }
      });
    }

    function showError(message) {
      document.getElementById('content').innerHTML = `
        <div class="error">
          <h3>⚠️ Error Loading Data</h3>
          <p>${message}</p>
          <p style="margin-top: 15px; font-size: 14px; color: #888;">
            Make sure the Google Sheet is published to web (File → Share → Publish to web)
          </p>
        </div>
      `;
    }

    function loadData() {
      document.getElementById('lastUpdated').textContent = 'Last updated: ' + new Date().toLocaleString();

      // Use corsproxy.io to bypass CORS restrictions
      const PROXY_URL = 'https://corsproxy.io/?' + encodeURIComponent(CSV_URL);

      fetch(PROXY_URL)
        .then(response => {
          if (!response.ok) {
            throw new Error('Network response was not ok: ' + response.status);
          }
          return response.text();
        })
        .then(csvText => {
          Papa.parse(csvText, {
            header: true,
            skipEmptyLines: true,
            complete: function(results) {
              console.log('Parsed data:', results.data.length, 'rows');
              try {
                rawData = processData(results.data);
                console.log('Processed data:', rawData.length, 'valid rows');
                const metrics = calculateMetrics(rawData);
                renderDashboard(rawData, metrics);
              } catch (error) {
                console.error('Processing error:', error);
                showError('Error processing data: ' + error.message);
              }
            }
          });
        })
        .catch(error => {
          console.error('Fetch error:', error);
          showError('Failed to load data: ' + error.message);
        });
    }

    // Auto-refresh every 5 minutes
    setInterval(loadData, 5 * 60 * 1000);

    // Initial load
    loadData();
  </script>
</body>
</html>
