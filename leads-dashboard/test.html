<!DOCTYPE html>
<html>
<head>
  <title>Test Connection</title>
  <style>
    body { font-family: monospace; padding: 20px; background: #1a1a2e; color: #fff; }
    .log { background: #000; padding: 10px; margin: 10px 0; border-radius: 8px; }
    .success { color: #38ef7d; }
    .error { color: #eb3349; }
    .info { color: #667eea; }
  </style>
</head>
<body>
  <h1>🔌 Testing Leads Data Connection</h1>
  <div id="logs" class="logs"></div>

  <script>
    const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQza5B6DrWd1smNddShoPKYT42_lRWCYqqvvoffdZNgx_Wp28KySj2HiMsefasoTdjCuUuqNTTgEZMH/pub?output=csv';
    const PROXY_URL = 'https://corsproxy.io/?' + encodeURIComponent(CSV_URL);

    function log(message, type = 'info') {
      const logs = document.getElementById('logs');
      const div = document.createElement('div');
      div.className = 'log ' + type;
      div.textContent = message;
      logs.appendChild(div);
    }

    async function testConnection() {
      log('Starting connection test...', 'info');
      log('CSV URL: ' + CSV_URL, 'info');
      log('Proxy URL: ' + PROXY_URL, 'info');

      try {
        log('Fetching data from proxy...', 'info');
        const response = await fetch(PROXY_URL);
        log('Response status: ' + response.status + ' ' + response.statusText, response.ok ? 'success' : 'error');

        if (!response.ok) {
          throw new Error('HTTP ' + response.status);
        }

        const text = await response.text();
        log('Received ' + text.length + ' bytes of data', 'success');
        log('First 200 chars: ' + text.substring(0, 200), 'info');

        // Test PapaParse
        if (typeof Papa !== 'undefined') {
          Papa.parse(text, {
            header: true,
            skipEmptyLines: true,
            complete: function(results) {
              log('✅ Parsed ' + results.data.length + ' rows successfully!', 'success');
              log('First row: ' + JSON.stringify(results.data[0]), 'info');
            }
          });
        } else {
          log('PapaParse not loaded', 'error');
        }
      } catch (error) {
        log('❌ Error: ' + error.message, 'error');
      }
    }

    // Load PapaParse then test
    const script = document.createElement('script');
    script.src = 'https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js';
    script.onload = testConnection;
    document.head.appendChild(script);
  </script>
</body>
</html>
