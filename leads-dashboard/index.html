<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Med Buddy Leads Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      /* Design System - Dark Theme with Glassmorphism */
      --bg-primary: #0a0a0f;
      --bg-secondary: #12121a;
      --bg-card: rgba(255, 255, 255, 0.03);
      --bg-card-hover: rgba(255, 255, 255, 0.06);

      --gradient-primary: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      --gradient-success: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
      --gradient-warning: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
      --gradient-info: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
      --gradient-danger: linear-gradient(135deg, #eb3349 0%, #f45c43 100%);

      --text-primary: #ffffff;
      --text-secondary: #a0a0b0;
      --text-muted: #6b6b7b;

      --border-glass: rgba(255, 255, 255, 0.08);
      --shadow-glass: 0 8px 32px rgba(0, 0, 0, 0.4);
      --backdrop-blur: blur(20px);

      --radius-sm: 8px;
      --radius-md: 12px;
      --radius-lg: 16px;
      --radius-xl: 24px;

      --spacing-xs: 4px;
      --spacing-sm: 8px;
      --spacing-md: 16px;
      --spacing-lg: 24px;
      --spacing-xl: 32px;

      --transition-fast: 150ms cubic-bezier(0.4, 0, 0.2, 1);
      --transition-base: 250ms cubic-bezier(0.4, 0, 0.2, 1);
      --transition-slow: 400ms cubic-bezier(0.4, 0, 0.2, 1);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg-primary);
      background-image:
        radial-gradient(ellipse at top, rgba(102, 126, 234, 0.15) 0%, transparent 50%),
        radial-gradient(ellipse at bottom right, rgba(118, 75, 162, 0.1) 0%, transparent 50%);
      min-height: 100vh;
      color: var(--text-primary);
      line-height: 1.5;
    }

    .container {
      max-width: 1600px;
      margin: 0 auto;
      padding: var(--spacing-lg);
    }

    /* Header */
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: var(--spacing-xl);
      padding-bottom: var(--spacing-lg);
      border-bottom: 1px solid var(--border-glass);
    }

    .header-title {
      display: flex;
      align-items: center;
      gap: var(--spacing-md);
    }

    h1 {
      font-size: 28px;
      font-weight: 700;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #4facfe 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .header-actions {
      display: flex;
      align-items: center;
      gap: var(--spacing-md);
    }

    .last-updated {
      font-size: 13px;
      color: var(--text-muted);
      font-family: 'JetBrains Mono', monospace;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: var(--spacing-sm);
      padding: 10px 18px;
      border-radius: var(--radius-md);
      font-size: 14px;
      font-weight: 600;
      border: none;
      cursor: pointer;
      transition: all var(--transition-base);
      font-family: 'Inter', sans-serif;
    }

    .btn-primary {
      background: var(--gradient-primary);
      color: white;
      box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(102, 126, 234, 0.5);
    }

    .btn-glass {
      background: var(--bg-card);
      color: var(--text-primary);
      border: 1px solid var(--border-glass);
      backdrop-filter: var(--backdrop-blur);
    }

    .btn-glass:hover {
      background: var(--bg-card-hover);
      border-color: rgba(255, 255, 255, 0.15);
    }

    /* Filter Bar */
    .filter-bar {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: var(--spacing-md);
      margin-bottom: var(--spacing-xl);
      padding: var(--spacing-lg);
      background: var(--bg-card);
      border: 1px solid var(--border-glass);
      border-radius: var(--radius-lg);
      backdrop-filter: var(--backdrop-blur);
    }

    .filter-group {
      display: flex;
      flex-direction: column;
      gap: var(--spacing-xs);
    }

    .filter-label {
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text-muted);
    }

    .filter-select,
    .filter-input {
      padding: 10px 14px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--border-glass);
      border-radius: var(--radius-md);
      color: var(--text-primary);
      font-size: 14px;
      font-family: 'Inter', sans-serif;
      transition: all var(--transition-fast);
      outline: none;
    }

    .filter-select:hover,
    .filter-input:hover {
      border-color: rgba(255, 255, 255, 0.15);
    }

    .filter-select:focus,
    .filter-input:focus {
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.2);
    }

    .filter-select option {
      background: var(--bg-secondary);
      color: var(--text-primary);
    }

    /* KPI Grid */
    .kpi-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: var(--spacing-lg);
      margin-bottom: var(--spacing-xl);
    }

    .kpi-card {
      position: relative;
      padding: var(--spacing-lg);
      background: var(--bg-card);
      border: 1px solid var(--border-glass);
      border-radius: var(--radius-lg);
      backdrop-filter: var(--backdrop-blur);
      overflow: hidden;
      transition: all var(--transition-base);
    }

    .kpi-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: var(--gradient);
      opacity: 0;
      transition: opacity var(--transition-base);
    }

    .kpi-card:hover {
      transform: translateY(-4px);
      background: var(--bg-card-hover);
      box-shadow: var(--shadow-glass);
    }

    .kpi-card:hover::before {
      opacity: 1;
    }

    .kpi-card.high { --gradient: var(--gradient-primary); }
    .kpi-card.success { --gradient: var(--gradient-success); }
    .kpi-card.warning { --gradient: var(--gradient-warning); }
    .kpi-card.info { --gradient: var(--gradient-info); }

    .kpi-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: var(--spacing-sm);
    }

    .kpi-title {
      font-size: 13px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text-muted);
    }

    .kpi-icon {
      width: 36px;
      height: 36px;
      border-radius: var(--radius-md);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      background: var(--gradient);
    }

    .kpi-value {
      font-size: 32px;
      font-weight: 700;
      font-family: 'JetBrains Mono', monospace;
      color: var(--text-primary);
    }

    .kpi-subtitle {
      font-size: 13px;
      color: var(--text-secondary);
      margin-top: var(--spacing-xs);
    }

    /* Charts Grid */
    .charts-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(380px, 1fr));
      gap: var(--spacing-lg);
      margin-bottom: var(--spacing-xl);
    }

    .chart-card {
      background: var(--bg-card);
      border: 1px solid var(--border-glass);
      border-radius: var(--radius-lg);
      backdrop-filter: var(--backdrop-blur);
      padding: var(--spacing-lg);
      transition: all var(--transition-base);
    }

    .chart-card:hover {
      background: var(--bg-card-hover);
      box-shadow: var(--shadow-glass);
    }

    .chart-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: var(--spacing-lg);
    }

    .chart-title {
      font-size: 16px;
      font-weight: 600;
      color: var(--text-primary);
    }

    .chart-container {
      position: relative;
      height: 280px;
    }

    .chart-full {
      grid-column: 1 / -1;
    }

    /* Funnel */
    .funnel-container {
      display: flex;
      flex-direction: column;
      gap: var(--spacing-sm);
    }

    .funnel-stage {
      display: flex;
      align-items: center;
      gap: var(--spacing-md);
      padding: var(--spacing-md);
      background: rgba(255, 255, 255, 0.02);
      border-radius: var(--radius-md);
      transition: all var(--transition-fast);
    }

    .funnel-stage:hover {
      background: rgba(255, 255, 255, 0.04);
      transform: translateX(4px);
    }

    .funnel-bar {
      flex: 1;
      height: 32px;
      border-radius: var(--radius-sm);
      background: var(--gradient);
      display: flex;
      align-items: center;
      padding: 0 var(--spacing-md);
      position: relative;
      overflow: hidden;
    }

    .funnel-bar::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
    }

    .funnel-label {
      position: relative;
      z-index: 1;
      font-size: 13px;
      font-weight: 600;
      color: white;
      text-shadow: 0 1px 2px rgba(0,0,0,0.3);
    }

    .funnel-count {
      min-width: 50px;
      text-align: right;
      font-size: 14px;
      font-weight: 700;
      font-family: 'JetBrains Mono', monospace;
      color: var(--text-primary);
    }

    .funnel-percent {
      min-width: 45px;
      text-align: right;
      font-size: 12px;
      color: var(--text-muted);
    }

    /* Table */
    .table-card {
      background: var(--bg-card);
      border: 1px solid var(--border-glass);
      border-radius: var(--radius-lg);
      backdrop-filter: var(--backdrop-blur);
      overflow: hidden;
    }

    .table-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: var(--spacing-lg);
      border-bottom: 1px solid var(--border-glass);
    }

    .table-title {
      font-size: 16px;
      font-weight: 600;
      color: var(--text-primary);
    }

    .table-wrapper {
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th {
      padding: var(--spacing-md) var(--spacing-lg);
      text-align: left;
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text-muted);
      border-bottom: 1px solid var(--border-glass);
      background: rgba(255, 255, 255, 0.02);
    }

    td {
      padding: var(--spacing-md) var(--spacing-lg);
      font-size: 14px;
      color: var(--text-secondary);
      border-bottom: 1px solid rgba(255, 255, 255, 0.03);
      transition: background var(--transition-fast);
    }

    tr:hover td {
      background: rgba(255, 255, 255, 0.02);
    }

    .badge {
      display: inline-flex;
      align-items: center;
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.3px;
    }

    .badge-high {
      background: rgba(235, 51, 73, 0.15);
      color: #eb3349;
      border: 1px solid rgba(235, 51, 73, 0.3);
    }

    .badge-medium {
      background: rgba(245, 87, 108, 0.15);
      color: #f5576c;
      border: 1px solid rgba(245, 87, 108, 0.3);
    }

    .badge-low {
      background: rgba(102, 126, 234, 0.15);
      color: #667eea;
      border: 1px solid rgba(102, 126, 234, 0.3);
    }

    .badge-called {
      background: rgba(56, 239, 125, 0.15);
      color: #38ef7d;
      border: 1px solid rgba(56, 239, 125, 0.3);
    }

    .badge-attempted {
      background: rgba(240, 147, 251, 0.15);
      color: #f093fb;
      border: 1px solid rgba(240, 147, 251, 0.3);
    }

    /* Loading */
    .loading {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 500px;
      gap: var(--spacing-lg);
    }

    .spinner {
      width: 50px;
      height: 50px;
      border: 3px solid rgba(255, 255, 255, 0.1);
      border-top-color: #667eea;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .loading-text {
      color: var(--text-muted);
      font-size: 14px;
    }

    /* Error */
    .error {
      background: rgba(235, 51, 73, 0.1);
      border: 1px solid rgba(235, 51, 73, 0.3);
      border-radius: var(--radius-lg);
      padding: var(--spacing-xl);
      text-align: center;
      color: #eb3349;
    }

    /* Responsive */
    @media (max-width: 1024px) {
      .charts-grid {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 768px) {
      .container {
        padding: var(--spacing-md);
      }

      header {
        flex-direction: column;
        gap: var(--spacing-md);
        text-align: center;
      }

      .filter-bar {
        grid-template-columns: 1fr;
      }

      .kpi-grid {
        grid-template-columns: repeat(2, 1fr);
      }

      .kpi-value {
        font-size: 24px;
      }
    }

    /* Scrollbar */
    ::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }

    ::-webkit-scrollbar-track {
      background: var(--bg-secondary);
    }

    ::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.1);
      border-radius: 4px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: rgba(255, 255, 255, 0.2);
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <div class="header-title">
        <h1>🎯 Med Buddy Leads Dashboard</h1>
      </div>
      <div class="header-actions">
        <span class="last-updated" id="lastUpdated">Last updated: --</span>
        <button class="btn btn-primary" onclick="loadData()">
          <span>↻</span> Refresh
        </button>
      </div>
    </header>

    <!-- Filter Bar -->
    <div class="filter-bar">
      <div class="filter-group">
        <label class="filter-label">Search</label>
        <input type="text" class="filter-input" id="searchFilter" placeholder="Name or Contact..." oninput="applyFilters()">
      </div>
      <div class="filter-group">
        <label class="filter-label">Lead Source</label>
        <select class="filter-select" id="sourceFilter" onchange="applyFilters()">
          <option value="">All Sources</option>
        </select>
      </div>
      <div class="filter-group">
        <label class="filter-label">Lead Stage</label>
        <select class="filter-select" id="stageFilter" onchange="applyFilters()">
          <option value="">All Stages</option>
        </select>
      </div>
      <div class="filter-group">
        <label class="filter-label">Interest Level</label>
        <select class="filter-select" id="interestFilter" onchange="applyFilters()">
          <option value="">All Levels</option>
          <option value="HIGH">High</option>
          <option value="MEDIUM">Medium</option>
          <option value="LOW">Low</option>
        </select>
      </div>
      <div class="filter-group">
        <label class="filter-label">Date From</label>
        <input type="date" class="filter-input" id="dateFrom" onchange="applyFilters()">
      </div>
      <div class="filter-group">
        <label class="filter-label">Date To</label>
        <input type="date" class="filter-input" id="dateTo" onchange="applyFilters()">
      </div>
    </div>

    <div id="content">
      <div class="loading">
        <div class="spinner"></div>
        <span class="loading-text">Loading leads data...</span>
      </div>
    </div>
  </div>

  <script>
    // API endpoint - uses local proxy when testing, direct URL when deployed
    const API_URL = '/api/csv';

    let allData = [];
    let filteredData = [];
    let charts = {};

    // Parse date from various formats
    function parseDate(dateStr) {
      if (!dateStr || dateStr === '-') return null;

      // Handle "23 Jun 2026" format
      const months = {
        'Jan': 0, 'Feb': 1, 'Mar': 2, 'Apr': 3, 'May': 4, 'Jun': 5,
        'Jul': 6, 'Aug': 7, 'Sep': 8, 'Oct': 9, 'Nov': 10, 'Dec': 11
      };
      const match = dateStr.match(/(\d{1,2})\s+([A-Za-z]{3})\s+(\d{4})/);
      if (match) {
        return new Date(parseInt(match[3]), months[match[2]], parseInt(match[1]));
      }

      // Try standard parsing
      const parsed = new Date(dateStr);
      return isNaN(parsed.getTime()) ? null : parsed;
    }

    function formatDate(date) {
      if (!date) return '-';
      return date.toLocaleDateString('en-GB', { day: '2-digit', month: 'short', year: 'numeric' });
    }

    function parseFollowUp(dateStr) {
      if (!dateStr || dateStr === '-') return null;
      return parseDate(dateStr);
    }

    function processData(data) {
      return data.map(row => ({
        leadId: row['LEAD ID'] || '',
        dateReceived: parseDate(row['DATE RECEIVED']),
        dateReceivedStr: row['DATE RECEIVED'] || '',
        contact: row['CONTACT'] || '',
        name: row['NAME (If Known)'] || '',
        age: parseInt(row['AGE']) || null,
        leadSource: row['LEAD SOURCE'] || 'Unknown',
        leadStage: row['LEAD STAGE'] || 'Unknown',
        timeOfCall: row['TIME OF CALL'] || '',
        interest: row['INTEREST'] || 'NOT SET',
        initialNotes: row['INITIAL INQUIRY/NOTES'] || '',
        lastContacted: parseDate(row['LAST CONTACTED']),
        nextFollowUp: parseFollowUp(row['Next Follow-up']),
        conversationSummary: row['LAST CONVERSATION SUMMARY'] || ''
      })).filter(row => row.leadId !== '');
    }

    function getUniqueValues(data, field) {
      return [...new Set(data.map(d => d[field]).filter(Boolean))].sort();
    }

    function populateFilters(data) {
      const sourceSelect = document.getElementById('sourceFilter');
      const stageSelect = document.getElementById('stageFilter');

      const sources = getUniqueValues(data, 'leadSource');
      const stages = getUniqueValues(data, 'leadStage');

      sources.forEach(source => {
        const option = document.createElement('option');
        option.value = source;
        option.textContent = source;
        sourceSelect.appendChild(option);
      });

      stages.forEach(stage => {
        const option = document.createElement('option');
        option.value = stage;
        option.textContent = stage;
        stageSelect.appendChild(option);
      });
    }

    function applyFilters() {
      const search = document.getElementById('searchFilter').value.toLowerCase();
      const source = document.getElementById('sourceFilter').value;
      const stage = document.getElementById('stageFilter').value;
      const interest = document.getElementById('interestFilter').value;
      const dateFrom = document.getElementById('dateFrom').value;
      const dateTo = document.getElementById('dateTo').value;

      filteredData = allData.filter(d => {
        // Search filter
        if (search) {
          const searchMatch =
            (d.name && d.name.toLowerCase().includes(search)) ||
            (d.contact && d.contact.toLowerCase().includes(search)) ||
            (d.leadId && d.leadId.toLowerCase().includes(search));
          if (!searchMatch) return false;
        }

        // Source filter
        if (source && d.leadSource !== source) return false;

        // Stage filter
        if (stage && d.leadStage !== stage) return false;

        // Interest filter
        if (interest && d.interest !== interest) return false;

        // Date range filters
        if (dateFrom && d.dateReceived && d.dateReceived < new Date(dateFrom)) return false;
        if (dateTo && d.dateReceived && d.dateReceived > new Date(dateTo + 'T23:59:59')) return false;

        return true;
      });

      renderDashboard(filteredData);
    }

    function calculateMetrics(data) {
      const total = data.length;

      // By stage
      const byStage = {};
      data.forEach(d => {
        byStage[d.leadStage] = (byStage[d.leadStage] || 0) + 1;
      });

      // By source
      const bySource = {};
      data.forEach(d => {
        bySource[d.leadSource] = (bySource[d.leadSource] || 0) + 1;
      });

      // By interest
      const byInterest = {
        HIGH: data.filter(d => d.interest === 'HIGH').length,
        MEDIUM: data.filter(d => d.interest === 'MEDIUM').length,
        LOW: data.filter(d => d.interest === 'LOW').length,
        'NOT SET': data.filter(d => d.interest === 'NOT SET' || !d.interest).length
      };

      // Follow-ups due
      const today = new Date();
      today.setHours(0, 0, 0, 0);
      const followUpsDue = data.filter(d =>
        d.nextFollowUp && d.nextFollowUp <= today
      ).length;

      const followUpsUpcoming = data.filter(d => {
        if (!d.nextFollowUp) return false;
        const upcoming = new Date(today);
        upcoming.setDate(upcoming.getDate() + 7);
        return d.nextFollowUp > today && d.nextFollowUp <= upcoming;
      }).length;

      // This week and this month
      const now = new Date();
      const thisWeek = data.filter(d => {
        if (!d.dateReceived) return false;
        const weekAgo = new Date(now);
        weekAgo.setDate(weekAgo.getDate() - 7);
        return d.dateReceived >= weekAgo;
      }).length;

      const thisMonth = data.filter(d => {
        if (!d.dateReceived) return false;
        return d.dateReceived.getMonth() === now.getMonth() &&
               d.dateReceived.getFullYear() === now.getFullYear();
      }).length;

      // Daily trend
      const dailyTrend = {};
      data.filter(d => d.dateReceived).forEach(d => {
        const key = d.dateReceived.toISOString().split('T')[0];
        dailyTrend[key] = (dailyTrend[key] || 0) + 1;
      });

      return {
        total,
        byStage,
        bySource,
        byInterest,
        followUpsDue,
        followUpsUpcoming,
        thisWeek,
        thisMonth,
        dailyTrend
      };
    }

    function createChart(ctx, type, data, options = {}) {
      Chart.defaults.color = '#a0a0b0';
      Chart.defaults.font.family = 'Inter';

      return new Chart(ctx, {
        type,
        data,
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: {
              display: options.hideLegend ? false : true,
              labels: {
                color: '#6b6b7b',
                padding: 15,
                font: { size: 12 }
              }
            },
            tooltip: {
              backgroundColor: 'rgba(10, 10, 15, 0.95)',
              titleColor: '#ffffff',
              bodyColor: '#a0a0b0',
              borderColor: 'rgba(255, 255, 255, 0.1)',
              borderWidth: 1,
              padding: 12,
              displayColors: true,
              cornerRadius: 8,
              titleFont: { size: 14, weight: '600' },
              bodyFont: { size: 13 }
            }
          },
          scales: {
            x: {
              grid: {
                color: 'rgba(255, 255, 255, 0.03)',
                drawBorder: false
              },
              ticks: {
                color: '#6b6b7b',
                font: { size: 11 }
              }
            },
            y: {
              grid: {
                color: 'rgba(255, 255, 255, 0.03)',
                drawBorder: false
              },
              ticks: {
                color: '#6b6b7b',
                font: { size: 11 }
              },
              beginAtZero: true
            }
          },
          ...options
        }
      });
    }

    function renderDashboard(data) {
      const metrics = calculateMetrics(data);

      document.getElementById('content').innerHTML = `
        <!-- KPI Cards -->
        <div class="kpi-grid">
          <div class="kpi-card high">
            <div class="kpi-header">
              <div>
                <div class="kpi-title">Total Leads</div>
                <div class="kpi-subtitle">${metrics.thisWeek} this week</div>
              </div>
              <div class="kpi-icon" style="--gradient: var(--gradient-primary)">📊</div>
            </div>
            <div class="kpi-value">${metrics.total.toLocaleString()}</div>
          </div>

          <div class="kpi-card success">
            <div class="kpi-header">
              <div>
                <div class="kpi-title">Called</div>
                <div class="kpi-subtitle">${metrics.byStage['Called'] || 0} contacted</div>
              </div>
              <div class="kpi-icon" style="--gradient: var(--gradient-success)">✓</div>
            </div>
            <div class="kpi-value">${(metrics.byStage['Called'] || 0).toLocaleString()}</div>
          </div>

          <div class="kpi-card warning">
            <div class="kpi-header">
              <div>
                <div class="kpi-title">High Interest</div>
                <div class="kpi-subtitle">${metrics.byInterest.HIGH} hot leads</div>
              </div>
              <div class="kpi-icon" style="--gradient: var(--gradient-warning)">🔥</div>
            </div>
            <div class="kpi-value">${metrics.byInterest.HIGH.toLocaleString()}</div>
          </div>

          <div class="kpi-card info">
            <div class="kpi-header">
              <div>
                <div class="kpi-title">Follow-ups Due</div>
                <div class="kpi-subtitle">${metrics.followUpsUpcoming} upcoming (7 days)</div>
              </div>
              <div class="kpi-icon" style="--gradient: var(--gradient-info)">⏰</div>
            </div>
            <div class="kpi-value">${metrics.followUpsDue.toLocaleString()}</div>
          </div>
        </div>

        <!-- Charts Row 1 -->
        <div class="charts-grid">
          <div class="chart-card">
            <div class="chart-header">
              <div class="chart-title">📈 Daily Lead Trend</div>
            </div>
            <div class="chart-container">
              <canvas id="trendChart"></canvas>
            </div>
          </div>

          <div class="chart-card">
            <div class="chart-header">
              <div class="chart-title">🎯 Interest Distribution</div>
            </div>
            <div class="chart-container">
              <canvas id="interestChart"></canvas>
            </div>
          </div>
        </div>

        <!-- Charts Row 2 -->
        <div class="charts-grid">
          <div class="chart-card">
            <div class="chart-header">
              <div class="chart-title">📍 Lead Sources</div>
            </div>
            <div class="chart-container">
              <canvas id="sourceChart"></canvas>
            </div>
          </div>

          <div class="chart-card">
            <div class="chart-header">
              <div class="chart-title">🔄 Lead Stages</div>
            </div>
            <div class="chart-container">
              <canvas id="stageChart"></canvas>
            </div>
          </div>
        </div>

        <!-- Funnel -->
        <div class="chart-card chart-full">
          <div class="chart-header">
            <div class="chart-title">🌊 Conversion Funnel</div>
          </div>
          <div class="funnel-container" id="funnelContainer"></div>
        </div>

        <!-- Recent Leads Table -->
        <div class="table-card" style="margin-top: ${var(--spacing-xl)}">
          <div class="table-header">
            <div class="table-title">📋 Recent Leads</div>
            <button class="btn btn-glass" onclick="exportTable()">Export CSV</button>
          </div>
          <div class="table-wrapper">
            <table>
              <thead>
                <tr>
                  <th>Lead ID</th>
                  <th>Date</th>
                  <th>Name</th>
                  <th>Contact</th>
                  <th>Source</th>
                  <th>Stage</th>
                  <th>Interest</th>
                  <th>Follow-up</th>
                </tr>
              </thead>
              <tbody>
                ${data.slice(-20).reverse().map(d => `
                  <tr>
                    <td style="font-family: 'JetBrains Mono', monospace; font-size: 13px;">${d.leadId}</td>
                    <td>${d.dateReceivedStr || '-'}</td>
                    <td>${d.name || '-'}</td>
                    <td style="font-family: 'JetBrains Mono', monospace;">${d.contact || '-'}</td>
                    <td>${d.leadSource}</td>
                    <td>
                      <span class="badge ${d.leadStage === 'Called' ? 'badge-called' : 'badge-attempted'}">
                        ${d.leadStage}
                      </span>
                    </td>
                    <td>
                      <span class="badge badge-${d.interest.toLowerCase()}">
                        ${d.interest}
                      </span>
                    </td>
                    <td>${formatDate(d.nextFollowUp)}</td>
                  </tr>
                `).join('')}
              </tbody>
            </table>
          </div>
        </div>
      `;

      // Create charts
      const trendCtx = document.getElementById('trendChart').getContext('2d');
      const sortedDates = Object.keys(metrics.dailyTrend).sort().slice(-14);
      charts.trend = createChart(trendCtx, 'line', {
        labels: sortedDates.map(d => d.slice(5)), // MM-DD format
        datasets: [{
          label: 'Leads',
          data: sortedDates.map(d => metrics.dailyTrend[d]),
          borderColor: '#667eea',
          backgroundColor: 'rgba(102, 126, 234, 0.1)',
          fill: true,
          tension: 0.4,
          pointBackgroundColor: '#667eea',
          pointBorderColor: '#fff',
          pointBorderWidth: 2,
          pointRadius: 4,
          pointHoverRadius: 6
        }]
      }, {
        plugins: { legend: { display: false } }
      });

      const interestCtx = document.getElementById('interestChart').getContext('2d');
      charts.interest = createChart(interestCtx, 'doughnut', {
        labels: ['High', 'Medium', 'Low', 'Not Set'],
        datasets: [{
          data: [metrics.byInterest.HIGH, metrics.byInterest.MEDIUM, metrics.byInterest.LOW, metrics.byInterest['NOT SET']],
          backgroundColor: [
            'rgba(235, 51, 73, 0.8)',
            'rgba(245, 87, 108, 0.8)',
            'rgba(102, 126, 234, 0.8)',
            'rgba(255, 255, 255, 0.2)'
          ],
          borderColor: 'rgba(255, 255, 255, 0.1)',
          borderWidth: 1
        }]
      }, {
        cutout: '65%',
        plugins: { legend: { position: 'bottom' } }
      });

      const sourceCtx = document.getElementById('sourceChart').getContext('2d');
      const topSources = Object.entries(metrics.bySource)
        .sort((a, b) => b[1] - a[1])
        .slice(0, 8);
      charts.source = createChart(sourceCtx, 'bar', {
        labels: topSources.map(s => s[0].length > 20 ? s[0].substring(0, 20) + '...' : s[0]),
        datasets: [{
          label: 'Leads',
          data: topSources.map(s => s[1]),
          backgroundColor: 'rgba(118, 75, 162, 0.7)',
          borderRadius: 8,
          border: { color: 'rgba(118, 75, 162, 1)', width: 1 }
        }]
      }, {
        indexAxis: 'y',
        plugins: { legend: { display: false } }
      });

      const stageCtx = document.getElementById('stageChart').getContext('2d');
      charts.stage = createChart(stageCtx, 'bar', {
        labels: Object.keys(metrics.byStage),
        datasets: [{
          label: 'Leads',
          data: Object.values(metrics.byStage),
          backgroundColor: [
            'rgba(56, 239, 125, 0.7)',
            'rgba(240, 147, 251, 0.7)',
            'rgba(102, 126, 234, 0.7)'
          ],
          borderRadius: 8
        }]
      }, {
        plugins: { legend: { display: false } }
      });

      // Render funnel
      const totalLeads = metrics.total;
      const funnelData = [
        { label: 'Attempted Call', count: metrics.byStage['Attempted Call'] || 0, gradient: 'linear-gradient(135deg, #f093fb 0%, #f5576c 100%)' },
        { label: 'Called', count: metrics.byStage['Called'] || 0, gradient: 'linear-gradient(135deg, #11998e 0%, #38ef7d 100%)' },
      ];

      const funnelContainer = document.getElementById('funnelContainer');
      funnelContainer.innerHTML = funnelData.map((stage, i) => {
        const width = totalLeads > 0 ? (stage.count / totalLeads) * 100 : 0;
        const percent = totalLeads > 0 ? ((stage.count / totalLeads) * 100).toFixed(1) : 0;
        return `
          <div class="funnel-stage">
            <div class="funnel-bar" style="width: ${Math.max(width, 15)}%; background: ${stage.gradient}">
              <span class="funnel-label">${stage.label}</span>
            </div>
            <span class="funnel-count">${stage.count}</span>
            <span class="funnel-percent">${percent}%</span>
          </div>
        `;
      }).join('');
    }

    function showError(message) {
      document.getElementById('content').innerHTML = `
        <div class="error">
          <h3 style="margin-bottom: 10px;">⚠️ Error Loading Data</h3>
          <p>${message}</p>
        </div>
      `;
    }

    function loadData() {
      document.getElementById('lastUpdated').textContent = 'Last updated: ' + new Date().toLocaleString();

      fetch(API_URL)
        .then(response => {
          if (!response.ok) {
            throw new Error('Server returned: ' + response.status);
          }
          return response.text();
        })
        .then(csvText => {
          Papa.parse(csvText, {
            header: true,
            skipEmptyLines: true,
            complete: function(results) {
              console.log('Parsed data:', results.data.length, 'rows');
              try {
                allData = processData(results.data);
                console.log('Processed data:', allData.length, 'valid rows');
                filteredData = [...allData];
                populateFilters(allData);
                renderDashboard(allData);
              } catch (error) {
                console.error('Processing error:', error);
                showError('Error processing data: ' + error.message);
              }
            }
          });
        })
        .catch(error => {
          console.error('Fetch error:', error);
          showError('Failed to load data: ' + error.message + '<br><br>Make sure the local server is running:<br><code>node server.js</code>');
        });
    }

    function exportTable() {
      const headers = ['Lead ID', 'Date', 'Name', 'Contact', 'Source', 'Stage', 'Interest', 'Follow-up'];
      const rows = filteredData.slice(-100).map(d => [
        d.leadId,
        d.dateReceivedStr,
        d.name,
        d.contact,
        d.leadSource,
        d.leadStage,
        d.interest,
        d.nextFollowUp ? d.nextFollowUp.toISOString().split('T')[0] : ''
      ]);

      const csv = [headers, ...rows].map(row =>
        row.map(cell => `"${cell || ''}"`).join(',')
      ).join('\n');

      const blob = new Blob([csv], { type: 'text/csv' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `leads-export-${new Date().toISOString().split('T')[0]}.csv`;
      a.click();
      URL.revokeObjectURL(url);
    }

    // Auto-refresh every 5 minutes
    setInterval(loadData, 5 * 60 * 1000);

    // Initial load
    loadData();
  </script>
</body>
</html>
